<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAT - Login</title>
    <meta name="description" content="Dealership Creative Automation Tool - Login">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-mark">DCAT</div>
                <h1>Dealership Creative<br>Automation Tool</h1>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <div id="loginError" class="error-msg" style="display:none;"></div>
                <button type="submit" id="loginBtn" class="btn-primary">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span>
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <p>Default: <code>admin</code> / <code>admin123</code></p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
